// app/build.gradle
plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.memorymatch'
    compileSdk 34

    defaultConfig {
        applicationId "com.memorymatch"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Enable ViewBinding (used instead of findViewById everywhere)
    buildFeatures {
        viewBinding true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    // Core Android
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // Material Design components (buttons, cards, dialogs)
    implementation 'com.google.android.material:material:1.11.0'

    // ConstraintLayout & CoordinatorLayout
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // ViewModel + LiveData (lifecycle-aware game state)
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.7.0'

    // Coroutines (timer, delayed flip-back)
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'

    // RecyclerView (4×4 card grid)
    implementation 'androidx.recyclerview:recyclerview:1.3.2'

    // Fragment (ResultDialogFragment)
    implementation 'androidx.fragment:fragment-ktx:1.6.2'
}
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}
